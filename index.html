<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>파일 공유</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }
    input, button, select { font-size: 16px; }
    select { font-size: 12px; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
  <main class="max-w-md mx-auto px-3 py-5">
    <header class="flex items-center justify-between mb-3">
      <h1 class="text-lg font-bold flex items-baseline gap-1.5">
        <span>📁 파일공유</span>
        <span class="text-[10px] font-normal text-slate-400">by 신CPA</span>
      </h1>
      <div class="flex items-center gap-1.5">
        <div id="admin-lock-slot"></div>
        <button
          id="new-project-btn"
          class="text-[11px] bg-blue-600 text-white font-medium rounded-lg px-2.5 py-1 active:bg-blue-700 transition shadow-sm"
        >
          + 새 프로젝트
        </button>
      </div>
    </header>

    <div id="project-list" class="space-y-1.5">
      <div class="flex items-center gap-2 px-3 py-2 bg-white rounded-xl border border-slate-100 shadow-sm animate-pulse">
        <div class="w-10 h-10 rounded-md bg-slate-200 shrink-0"></div>
        <div class="flex-1 space-y-1">
          <div class="h-3 bg-slate-200 rounded w-3/4"></div>
          <div class="h-2 bg-slate-200 rounded w-1/3"></div>
        </div>
      </div>
      <div class="flex items-center gap-2 px-3 py-2 bg-white rounded-xl border border-slate-100 shadow-sm animate-pulse opacity-70">
        <div class="w-10 h-10 rounded-md bg-slate-200 shrink-0"></div>
        <div class="flex-1 space-y-1">
          <div class="h-3 bg-slate-200 rounded w-2/3"></div>
          <div class="h-2 bg-slate-200 rounded w-1/4"></div>
        </div>
      </div>
    </div>
  </main>

  <div id="edit-modal" class="fixed inset-0 bg-black/50 z-50 hidden items-end sm:items-center justify-center p-3" style="display: none;">
    <div class="bg-white rounded-2xl p-4 w-full max-w-md flex flex-col">
      <div class="flex items-center justify-between mb-3">
        <h3 class="text-sm font-bold">프로젝트 수정</h3>
        <button id="edit-cancel-x" class="text-slate-400 text-lg leading-none px-1">✕</button>
      </div>

      <label class="text-[11px] text-slate-500 mb-1">이름</label>
      <input id="edit-name" type="text" maxlength="100" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm mb-3" />

      <label class="text-[11px] text-slate-500 mb-1.5">색상</label>
      <div id="edit-colors" class="grid grid-cols-5 gap-1.5 mb-4"></div>

      <div class="flex gap-2 justify-end">
        <button id="edit-cancel-btn" class="text-sm text-slate-600 px-3 py-2">취소</button>
        <button id="edit-save" class="text-sm bg-blue-600 text-white rounded-lg px-4 py-2 font-medium active:bg-blue-700">저장</button>
      </div>
    </div>
  </div>

  <script src="/admin.js"></script>
  <script src="/app.js"></script>
</body>
</html>
