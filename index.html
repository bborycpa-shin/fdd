<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f172a" />
  <title>파일 공유</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
  <main class="max-w-md mx-auto px-4 py-8">
    <header class="mb-6">
      <h1 class="text-2xl font-bold">📁 파일 공유</h1>
      <p class="text-slate-500 text-sm mt-1">프로젝트별로 파일을 관리하세요</p>
    </header>

    <button
      id="new-project-btn"
      class="w-full bg-blue-600 text-white font-medium rounded-2xl py-3 mb-6 active:bg-blue-700 transition"
    >
      + 새 프로젝트
    </button>

    <div id="project-list" class="space-y-2">
      <p class="text-slate-400 text-center py-8">불러오는 중...</p>
    </div>
  </main>

  <script src="/app.js"></script>
</body>
</html>
