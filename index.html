<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>파일 공유</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }
    input, button, select { font-size: 16px; }
    select { font-size: 12px; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
  <main class="max-w-md mx-auto px-3 py-5">
    <header class="flex items-center justify-between mb-3">
      <h1 class="text-lg font-bold">📁 파일 공유</h1>
      <button
        id="new-project-btn"
        class="text-xs bg-blue-600 text-white font-medium rounded-lg px-3 py-1.5 active:bg-blue-700 transition shadow-sm"
      >
        + 새 프로젝트
      </button>
    </header>

    <div id="project-list" class="space-y-1.5">
      <div class="flex items-center gap-2 px-3 py-2 bg-white rounded-xl border border-slate-100 shadow-sm animate-pulse">
        <div class="w-10 h-10 rounded-md bg-slate-200 shrink-0"></div>
        <div class="flex-1 space-y-1">
          <div class="h-3 bg-slate-200 rounded w-3/4"></div>
          <div class="h-2 bg-slate-200 rounded w-1/3"></div>
        </div>
      </div>
      <div class="flex items-center gap-2 px-3 py-2 bg-white rounded-xl border border-slate-100 shadow-sm animate-pulse opacity-70">
        <div class="w-10 h-10 rounded-md bg-slate-200 shrink-0"></div>
        <div class="flex-1 space-y-1">
          <div class="h-3 bg-slate-200 rounded w-2/3"></div>
          <div class="h-2 bg-slate-200 rounded w-1/4"></div>
        </div>
      </div>
    </div>
  </main>

  <script src="/app.js"></script>
</body>
</html>
