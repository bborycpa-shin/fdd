<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>파일 공유</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }
    input, button, select { font-size: 16px; }
    select { font-size: 12px; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
  <main class="max-w-md mx-auto px-3 py-5">
    <header class="mb-4">
      <h1 class="text-lg font-bold">📁 파일 공유</h1>
      <p class="text-slate-500 text-xs mt-0.5">프로젝트별로 파일을 관리하세요</p>
    </header>

    <button
      id="new-project-btn"
      class="w-full bg-blue-600 text-white text-sm font-medium rounded-xl py-2 mb-3 active:bg-blue-700 transition"
    >
      + 새 프로젝트
    </button>

    <div id="sort-bar" class="flex gap-1 overflow-x-auto whitespace-nowrap pb-1 mb-2 text-xs">
      <button data-sort="created_desc" class="sort-chip shrink-0 px-2.5 py-1 rounded-full border">최신순</button>
      <button data-sort="created_asc" class="sort-chip shrink-0 px-2.5 py-1 rounded-full border">오래된순</button>
      <button data-sort="name_asc" class="sort-chip shrink-0 px-2.5 py-1 rounded-full border">이름순</button>
      <button data-sort="name_desc" class="sort-chip shrink-0 px-2.5 py-1 rounded-full border">이름역순</button>
    </div>
    <style>
      #sort-bar::-webkit-scrollbar { display: none; }
      #sort-bar { scrollbar-width: none; }
    </style>

    <div id="project-list" class="space-y-1.5">
      <div class="flex items-center gap-2 px-3 py-1.5 bg-white rounded-xl border border-slate-200 animate-pulse">
        <div class="w-7 h-7 rounded-md bg-slate-200 shrink-0"></div>
        <div class="flex-1 space-y-1">
          <div class="h-3 bg-slate-200 rounded w-3/4"></div>
          <div class="h-2 bg-slate-200 rounded w-1/3"></div>
        </div>
      </div>
      <div class="flex items-center gap-2 px-3 py-1.5 bg-white rounded-xl border border-slate-200 animate-pulse opacity-70">
        <div class="w-7 h-7 rounded-md bg-slate-200 shrink-0"></div>
        <div class="flex-1 space-y-1">
          <div class="h-3 bg-slate-200 rounded w-2/3"></div>
          <div class="h-2 bg-slate-200 rounded w-1/4"></div>
        </div>
      </div>
      <div class="flex items-center gap-2 px-3 py-1.5 bg-white rounded-xl border border-slate-200 animate-pulse opacity-40">
        <div class="w-7 h-7 rounded-md bg-slate-200 shrink-0"></div>
        <div class="flex-1 space-y-1">
          <div class="h-3 bg-slate-200 rounded w-1/2"></div>
          <div class="h-2 bg-slate-200 rounded w-1/4"></div>
        </div>
      </div>
    </div>
  </main>

  <script src="/app.js"></script>
</body>
</html>
