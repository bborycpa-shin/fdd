<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="파일공유(by신)" />
  <meta name="application-name" content="파일공유(by신)" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="/icon.svg" />
  <link rel="apple-touch-icon" href="/icon.svg" />
  <title>파일공유(by신)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }
    input, button, select { font-size: 16px; }
    select { font-size: 12px; }
    #rotate-warning {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #0f172a;
      color: white;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      text-align: center;
      padding: 24px;
      font-size: 14px;
    }
    #rotate-warning .icon {
      font-size: 56px;
      animation: rotateHint 2s ease-in-out infinite;
    }
    @keyframes rotateHint {
      0%, 100% { transform: rotate(-90deg); }
      50% { transform: rotate(0deg); }
    }
    @media screen and (max-width: 932px) and (orientation: landscape) {
      #rotate-warning { display: flex; }
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
  <div id="rotate-warning">
    <div class="icon">📱</div>
    <div style="font-weight:700;font-size:16px;">세로 모드로 사용해주세요</div>
    <div style="font-size:12px;opacity:0.8;">기기를 세로로 돌려주세요</div>
  </div>
  <main class="max-w-md mx-auto px-3 py-3" style="padding-bottom: calc(30vh + 16px);">
    <div id="auth-status-slot" style="min-height:24px;"></div>
    <header class="flex items-center justify-between mb-3">
      <h1 class="text-lg font-bold flex items-baseline gap-1.5">
        <span>📁 파일공유</span>
        <span class="text-[10px] font-normal text-slate-400">by 신CPA</span>
      </h1>
      <div class="flex items-center gap-1.5">
        <button id="home-refresh-btn" class="shrink-0 inline-flex items-center justify-center w-7 h-7 rounded-lg bg-rose-50 border border-rose-300 text-rose-700 active:bg-rose-100 shadow-sm text-base leading-none" aria-label="새로고침" title="새로고침">
          <span class="refresh-icon inline-block">↻</span>
        </button>
        <div id="logout-slot"></div>
        <div id="admin-lock-slot"></div>
        <button
          id="new-project-btn"
          class="admin-only bg-blue-600 text-white font-bold rounded-lg w-7 h-7 inline-flex items-center justify-center text-base leading-none active:bg-blue-700 transition shadow-sm"
          aria-label="새 프로젝트"
          title="새 프로젝트 만들기"
        >
          +
        </button>
      </div>
    </header>

    <div class="relative mb-2">
      <input
        id="home-search-input"
        type="search"
        autocomplete="off"
        placeholder="🔍 프로젝트·파일 검색"
        class="w-full px-3 py-1.5 pr-8 text-xs bg-white border border-slate-300 rounded-lg focus:outline-none focus:border-blue-500 shadow-sm"
      />
      <button
        id="home-search-clear"
        type="button"
        class="absolute top-1/2 right-1.5 -translate-y-1/2 w-5 h-5 rounded-full bg-slate-200 text-slate-500 active:bg-slate-300 text-[10px] leading-none hidden"
        aria-label="검색 지우기"
        title="검색 지우기"
      >✕</button>
    </div>

    <div class="relative mb-3">
      <ul id="home-notice" class="px-3 py-2 pr-7 bg-red-50 border border-red-200 rounded-lg list-none text-[10px] text-red-700 leading-relaxed space-y-0.5 whitespace-pre-wrap"></ul>
      <button
        id="notice-edit-btn"
        class="admin-only absolute top-1 right-1 text-red-400 active:text-red-600 px-1 py-0.5 text-xs leading-none"
        aria-label="안내 문구 수정"
        title="안내 문구 수정"
      >✏</button>
    </div>

    <div id="notice-edit-modal" class="fixed inset-0 z-50 bg-black/40 hidden items-center justify-center p-4">
      <div class="bg-white rounded-xl shadow-lg w-full max-w-sm p-4">
        <h3 class="text-sm font-bold text-slate-800 mb-2">안내 문구 수정</h3>
        <p class="text-[10px] text-slate-500 mb-2 leading-snug">한 줄이 하나의 항목이 됩니다. 빈 줄은 빈 항목으로 표시돼요.</p>
        <textarea id="notice-edit-textarea" rows="6" class="w-full text-xs border border-slate-300 rounded-lg p-2 focus:outline-none focus:border-blue-500" placeholder="예) 프로젝트별 접근 권한은 식별번호로 구분"></textarea>
        <div class="flex gap-2 mt-3">
          <button id="notice-edit-cancel" class="flex-1 py-1.5 rounded-lg border border-slate-300 text-xs text-slate-700 active:bg-slate-100">취소</button>
          <button id="notice-edit-save" class="flex-1 py-1.5 rounded-lg bg-blue-600 text-white text-xs font-semibold active:bg-blue-700">저장</button>
        </div>
      </div>
    </div>

    <div id="project-list" class="space-y-1.5">
      <div class="flex items-center gap-2 px-3 py-2 bg-white rounded-xl border border-slate-100 shadow-sm animate-pulse">
        <div class="w-10 h-10 rounded-md bg-slate-200 shrink-0"></div>
        <div class="flex-1 space-y-1">
          <div class="h-3 bg-slate-200 rounded w-3/4"></div>
          <div class="h-2 bg-slate-200 rounded w-1/3"></div>
        </div>
      </div>
      <div class="flex items-center gap-2 px-3 py-2 bg-white rounded-xl border border-slate-100 shadow-sm animate-pulse opacity-70">
        <div class="w-10 h-10 rounded-md bg-slate-200 shrink-0"></div>
        <div class="flex-1 space-y-1">
          <div class="h-3 bg-slate-200 rounded w-2/3"></div>
          <div class="h-2 bg-slate-200 rounded w-1/4"></div>
        </div>
      </div>
    </div>

  </main>

  <div
    id="recent-files-bar"
    class="fixed bottom-0 left-0 right-0 bg-white border-t-2 border-slate-300 z-30 shadow-[0_-4px_12px_rgba(0,0,0,0.08)]"
    style="height: 30vh; padding-bottom: env(safe-area-inset-bottom);"
  >
    <div class="max-w-md mx-auto px-3 pt-2 pb-1 h-full flex flex-col">
      <h3 class="text-[10px] font-bold text-slate-500 mb-1 shrink-0 flex items-center gap-1">
        <span>📌 최근 등록된 파일</span>
        <span class="font-normal text-slate-400">(권한 범위 내)</span>
      </h3>
      <div id="home-recent-files" class="flex-1 overflow-y-auto space-y-1 pr-0.5">
        <p class="text-[10px] text-slate-400 text-center py-3">불러오는 중...</p>
      </div>
    </div>
  </div>

  <div id="edit-modal" class="fixed inset-0 bg-black/50 z-50 hidden items-end sm:items-center justify-center p-3" style="display: none;">
    <div class="bg-white rounded-2xl p-4 w-full max-w-md flex flex-col">
      <div class="flex items-center justify-between mb-3">
        <h3 class="text-sm font-bold">프로젝트 수정</h3>
        <button id="edit-cancel-x" class="text-slate-400 text-lg leading-none px-1">✕</button>
      </div>

      <label class="text-[11px] text-slate-500 mb-1">이름</label>
      <input id="edit-name" type="text" maxlength="100" class="w-full px-3 py-2 border border-slate-300 rounded-lg text-sm mb-3" />

      <label class="text-[11px] text-slate-500 mb-1.5">색상</label>
      <div id="edit-colors" class="grid grid-cols-5 gap-1.5 mb-4"></div>

      <div class="flex gap-2 justify-end">
        <button id="edit-cancel-btn" class="text-sm text-slate-600 px-3 py-2">취소</button>
        <button id="edit-save" class="text-sm bg-blue-600 text-white rounded-lg px-4 py-2 font-medium active:bg-blue-700">저장</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <script src="/admin.js"></script>
  <script src="/app.js"></script>
</body>
</html>
