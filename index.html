<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>파일 공유</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }
    input, button { font-size: 16px; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
  <main class="max-w-md mx-auto px-3 py-5">
    <header class="mb-4">
      <h1 class="text-lg font-bold">📁 파일 공유</h1>
      <p class="text-slate-500 text-xs mt-0.5">프로젝트별로 파일을 관리하세요</p>
    </header>

    <button
      id="new-project-btn"
      class="w-full bg-blue-600 text-white text-sm font-medium rounded-xl py-2 mb-3 active:bg-blue-700 transition"
    >
      + 새 프로젝트
    </button>

    <div id="project-list" class="space-y-1.5">
      <div class="flex items-center gap-2 px-3 py-2 bg-white rounded-xl border border-slate-200 animate-pulse">
        <div class="w-8 h-8 rounded-lg bg-slate-200 shrink-0"></div>
        <div class="flex-1 h-3.5 bg-slate-200 rounded"></div>
      </div>
      <div class="flex items-center gap-2 px-3 py-2 bg-white rounded-xl border border-slate-200 animate-pulse opacity-70">
        <div class="w-8 h-8 rounded-lg bg-slate-200 shrink-0"></div>
        <div class="flex-1 h-3.5 bg-slate-200 rounded"></div>
      </div>
      <div class="flex items-center gap-2 px-3 py-2 bg-white rounded-xl border border-slate-200 animate-pulse opacity-40">
        <div class="w-8 h-8 rounded-lg bg-slate-200 shrink-0"></div>
        <div class="flex-1 h-3.5 bg-slate-200 rounded"></div>
      </div>
    </div>
  </main>

  <script src="/app.js"></script>
</body>
</html>
