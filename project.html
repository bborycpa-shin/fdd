<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>프로젝트 - 파일 공유</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      padding-top: env(safe-area-inset-top);
    }
    input, button, select { font-size: 16px; }
    select { font-size: 12px; }
    body.drag-active::after {
      content: '⬆ 여기에 파일을 놓아주세요';
      position: fixed;
      inset: 0;
      background: rgba(37, 99, 235, 0.08);
      border: 4px dashed #2563eb;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #1d4ed8;
      font-size: 16px;
      font-weight: 600;
      z-index: 1000;
      pointer-events: none;
    }
    #breadcrumb::-webkit-scrollbar { display: none; }
    #breadcrumb { scrollbar-width: none; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
  <main class="max-w-md mx-auto px-3 py-4 pb-24">
    <a href="/" class="inline-flex items-center text-slate-600 active:text-slate-900 mb-2 text-xs">
      ← 프로젝트 목록
    </a>

    <h1 id="project-name" class="text-base font-bold mb-1 break-all leading-tight">&nbsp;</h1>

    <nav id="breadcrumb" class="text-xs text-slate-500 mb-2 h-5 flex items-center gap-1 overflow-x-auto whitespace-nowrap">
      <span>🏠</span>
    </nav>

    <details id="tree-container" class="bg-white rounded-xl border border-slate-200 mb-2 hidden" open>
      <summary class="px-3 py-1.5 text-xs font-medium cursor-pointer flex items-center gap-1 text-slate-600 select-none">
        폴더 구조
      </summary>
      <div id="folder-tree" class="px-2 pb-2 pt-1 max-h-56 overflow-y-auto text-xs border-t border-slate-100"></div>
    </details>

    <div class="grid grid-cols-2 gap-2 mb-2">
      <button
        id="new-folder-btn"
        class="bg-white border border-slate-300 text-slate-900 text-sm font-medium rounded-xl py-2 active:bg-slate-100 transition"
      >
        + 새 폴더
      </button>
      <button
        id="upload-btn"
        class="bg-blue-600 text-white text-sm font-medium rounded-xl py-2 active:bg-blue-700 transition"
      >
        ⬆ 파일 올리기
      </button>
    </div>

    <input id="file-input" type="file" multiple class="hidden" />

    <div class="flex items-center gap-1.5 mt-3 mb-2">
      <span class="text-[11px] text-slate-500">정렬</span>
      <select id="sort-select" class="bg-white border border-slate-300 rounded-lg px-2 py-0.5">
        <option value="created_desc">최신순</option>
        <option value="created_asc">오래된순</option>
        <option value="name_asc">이름순</option>
        <option value="name_desc">이름 역순</option>
        <option value="size_desc">큰 파일순</option>
        <option value="size_asc">작은 파일순</option>
      </select>
    </div>

    <p id="upload-status" class="text-xs text-blue-600 mt-2 mb-1 hidden text-center"></p>

    <div id="contents" class="space-y-1.5 mt-2">
      <div class="flex items-center gap-2 px-3 py-1.5 bg-white rounded-xl border border-slate-200 animate-pulse">
        <div class="w-7 h-7 rounded-md bg-slate-200 shrink-0"></div>
        <div class="flex-1 space-y-1">
          <div class="h-3 bg-slate-200 rounded w-3/4"></div>
          <div class="h-2 bg-slate-200 rounded w-1/3"></div>
        </div>
      </div>
      <div class="flex items-center gap-2 px-3 py-1.5 bg-white rounded-xl border border-slate-200 animate-pulse opacity-70">
        <div class="w-7 h-7 rounded-md bg-slate-200 shrink-0"></div>
        <div class="flex-1 space-y-1">
          <div class="h-3 bg-slate-200 rounded w-2/3"></div>
          <div class="h-2 bg-slate-200 rounded w-1/4"></div>
        </div>
      </div>
      <div class="flex items-center gap-2 px-3 py-1.5 bg-white rounded-xl border border-slate-200 animate-pulse opacity-40">
        <div class="w-7 h-7 rounded-md bg-slate-200 shrink-0"></div>
        <div class="flex-1 space-y-1">
          <div class="h-3 bg-slate-200 rounded w-1/2"></div>
          <div class="h-2 bg-slate-200 rounded w-1/4"></div>
        </div>
      </div>
    </div>
  </main>

  <div
    id="action-bar"
    class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 px-3 py-2.5 hidden z-40 shadow-[0_-4px_12px_rgba(0,0,0,0.05)]"
    style="padding-bottom: calc(env(safe-area-inset-bottom) + 10px);"
  >
    <div class="max-w-md mx-auto flex items-center gap-2">
      <span class="text-sm flex-1"><strong id="selected-count">0</strong>개 선택됨</span>
      <button id="cancel-select" class="text-sm text-slate-600 px-3 py-1.5">취소</button>
      <button id="bulk-delete" class="text-sm bg-red-600 text-white rounded-lg px-3 py-1.5 font-medium active:bg-red-700">🗑 삭제</button>
    </div>
  </div>

  <script src="/project.js"></script>
</body>
</html>
