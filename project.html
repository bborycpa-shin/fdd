<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f172a" />
  <title>프로젝트 - 파일 공유</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
  <main class="max-w-md mx-auto px-4 py-6">
    <a href="/" class="inline-flex items-center text-slate-600 active:text-slate-900 mb-3 text-sm">
      ← 프로젝트 목록
    </a>

    <h1 id="project-name" class="text-2xl font-bold mb-2">불러오는 중...</h1>

    <nav id="breadcrumb" class="text-sm text-slate-500 mb-5 flex flex-wrap items-center gap-1"></nav>

    <button
      id="new-folder-btn"
      class="w-full bg-blue-600 text-white font-medium rounded-2xl py-3 mb-5 active:bg-blue-700 transition"
    >
      + 새 폴더
    </button>

    <div id="contents" class="space-y-2">
      <p class="text-slate-400 text-center py-8">불러오는 중...</p>
    </div>
  </main>

  <script src="/project.js"></script>
</body>
</html>
