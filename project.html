<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <title>프로젝트 - 파일 공유</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      padding-top: env(safe-area-inset-top);
    }
    input, button, select { font-size: 16px; }
    body.drag-active::after {
      content: '⬆ 여기에 파일을 놓아주세요';
      position: fixed;
      inset: 0;
      background: rgba(37, 99, 235, 0.08);
      border: 4px dashed #2563eb;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #1d4ed8;
      font-size: 16px;
      font-weight: 600;
      z-index: 1000;
      pointer-events: none;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">
  <main class="max-w-md mx-auto px-3 py-4 pb-28">
    <a href="/" class="inline-flex items-center gap-1 text-xs text-slate-700 bg-white border border-slate-200 rounded-full pl-2 pr-3 py-1 mb-3 active:bg-slate-100 shadow-sm font-medium">
      <span class="text-base leading-none">‹</span>
      <span>프로젝트 목록</span>
    </a>

    <div class="flex items-start gap-2 mb-3">
      <h1 id="project-name" class="text-base font-bold break-all leading-tight flex-1 min-w-0">&nbsp;</h1>
      <button id="new-folder-btn" class="shrink-0 text-[11px] px-2 py-1 rounded-lg border border-slate-300 bg-white active:bg-slate-100 font-medium">
        + 폴더
      </button>
      <button id="upload-btn" class="shrink-0 text-[11px] px-2 py-1 rounded-lg bg-blue-600 text-white active:bg-blue-700 font-medium">
        ⬆ 올리기
      </button>
    </div>

    <div id="tree-container" class="mb-3">
      <div id="folder-tree" class="text-[11px]"></div>
    </div>

    <input id="file-input" type="file" multiple accept="*/*" class="hidden" />

    <div id="sort-bar" class="flex flex-wrap gap-1 mb-2 text-[11px]">
      <button data-action="select-all" id="select-all-btn" class="shrink-0 px-2 py-0.5 rounded-full border bg-white text-slate-700 border-slate-300 active:bg-slate-100">☐ 전체</button>
      <button data-sort="created_desc" class="sort-chip shrink-0 px-2 py-0.5 rounded-full border">최신순</button>
      <button data-sort="created_asc" class="sort-chip shrink-0 px-2 py-0.5 rounded-full border">오래된순</button>
      <button data-sort="name_asc" class="sort-chip shrink-0 px-2 py-0.5 rounded-full border">이름순</button>
      <button data-sort="name_desc" class="sort-chip shrink-0 px-2 py-0.5 rounded-full border">이름역순</button>
      <button data-sort="type" class="sort-chip shrink-0 px-2 py-0.5 rounded-full border">형식순</button>
    </div>

    <p id="upload-status" class="text-xs text-blue-600 mt-2 mb-1 hidden text-center"></p>

    <div id="contents" class="space-y-1.5 mt-2">
      <div class="flex items-center gap-2 px-3 py-1.5 bg-white rounded-xl border border-slate-200 animate-pulse">
        <div class="w-7 h-7 rounded-md bg-slate-200 shrink-0"></div>
        <div class="flex-1 space-y-1">
          <div class="h-3 bg-slate-200 rounded w-3/4"></div>
          <div class="h-2 bg-slate-200 rounded w-1/3"></div>
        </div>
      </div>
      <div class="flex items-center gap-2 px-3 py-1.5 bg-white rounded-xl border border-slate-200 animate-pulse opacity-70">
        <div class="w-7 h-7 rounded-md bg-slate-200 shrink-0"></div>
        <div class="flex-1 space-y-1">
          <div class="h-3 bg-slate-200 rounded w-2/3"></div>
          <div class="h-2 bg-slate-200 rounded w-1/4"></div>
        </div>
      </div>
      <div class="flex items-center gap-2 px-3 py-1.5 bg-white rounded-xl border border-slate-200 animate-pulse opacity-40">
        <div class="w-7 h-7 rounded-md bg-slate-200 shrink-0"></div>
        <div class="flex-1 space-y-1">
          <div class="h-3 bg-slate-200 rounded w-1/2"></div>
          <div class="h-2 bg-slate-200 rounded w-1/4"></div>
        </div>
      </div>
    </div>
  </main>

  <div
    id="action-bar"
    class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 px-3 py-2 hidden z-40 shadow-[0_-4px_12px_rgba(0,0,0,0.05)]"
    style="padding-bottom: calc(env(safe-area-inset-bottom) + 8px);"
  >
    <div class="max-w-md mx-auto">
      <div class="flex items-center mb-1.5">
        <span class="text-xs flex-1"><strong id="selected-count">0</strong>개 선택됨</span>
        <button id="cancel-select" class="text-xs text-slate-500 px-2 py-1">✕ 취소</button>
      </div>
      <div class="grid grid-cols-3 gap-1.5">
        <button id="bulk-download" class="text-xs bg-blue-600 text-white rounded-lg px-2 py-1.5 font-medium active:bg-blue-700">⬇ 다운로드</button>
        <button id="bulk-move" class="text-xs bg-slate-700 text-white rounded-lg px-2 py-1.5 font-medium active:bg-slate-800">📂 이동</button>
        <button id="bulk-delete" class="text-xs bg-red-600 text-white rounded-lg px-2 py-1.5 font-medium active:bg-red-700">🗑 삭제</button>
      </div>
    </div>
  </div>

  <div id="move-modal" class="fixed inset-0 bg-black/50 z-50 hidden items-end sm:items-center justify-center p-3" style="display: none;">
    <div class="bg-white rounded-2xl p-4 w-full max-w-md max-h-[80vh] flex flex-col">
      <div class="flex items-center justify-between mb-2">
        <h3 class="text-sm font-bold">어디로 이동할까요?</h3>
        <button id="move-cancel" class="text-slate-400 text-lg leading-none px-1">✕</button>
      </div>
      <p class="text-[10px] text-slate-500 mb-2">아래에서 이동할 위치를 선택하세요</p>
      <div id="move-folder-list" class="flex-1 overflow-y-auto space-y-0.5 text-xs"></div>
    </div>
  </div>

  <script src="/project.js"></script>
</body>
</html>
