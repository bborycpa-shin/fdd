<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="파일공유(by신)" />
  <meta name="application-name" content="파일공유(by신)" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/svg+xml" href="/icon.svg" />
  <link rel="apple-touch-icon" href="/icon.svg" />
  <title>파일공유(by신)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      padding-top: env(safe-area-inset-top);
      background-attachment: fixed;
      min-height: 100vh;
    }
    input, button, select { font-size: 16px; }
    body.drag-active::after {
      content: '⬆ 여기에 파일을 놓아주세요';
      position: fixed;
      inset: 0;
      background: rgba(37, 99, 235, 0.08);
      border: 4px dashed #2563eb;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #1d4ed8;
      font-size: 16px;
      font-weight: 600;
      z-index: 1000;
      pointer-events: none;
    }
    #project-image-row.logo-drop-active > div,
    #project-image-row.logo-drop-active > button {
      outline: 3px dashed #2563eb;
      outline-offset: 3px;
      border-radius: 12px;
    }
  </style>
</head>
<body class="text-slate-900">
  <main class="max-w-md mx-auto px-3 py-3" style="padding-bottom: calc(22vh + 12px);">
    <div id="auth-status-slot" style="min-height:24px;"></div>
    <div class="bg-white rounded-xl shadow-sm border border-slate-200 px-2 py-2 mb-3 flex items-center gap-1" style="min-height:46px;">
      <a href="/" class="shrink-0 inline-flex items-center gap-0.5 text-[11px] text-slate-700 bg-white border border-slate-200 rounded-full pl-1.5 pr-2 py-1 active:bg-slate-100 font-medium">
        <span class="text-sm leading-none">‹</span>
        <span>홈으로</span>
      </a>
      <div id="project-image-row" class="flex-1 flex justify-center items-center min-w-0 px-1"></div>
      <button id="new-folder-btn" class="shrink-0 text-[10px] px-1.5 py-1 rounded-lg border border-slate-300 bg-white text-slate-800 active:bg-slate-100 font-medium">
        +폴더
      </button>
      <button id="upload-btn" class="shrink-0 text-[10px] px-1.5 py-1 rounded-lg border border-blue-300 bg-white text-blue-700 active:bg-blue-50 font-medium">
        ⬆업로드
      </button>
      <div id="admin-lock-slot"></div>
    </div>

    <div id="tree-container" class="mb-3">
      <div id="folder-tree" class="text-[11px]" style="min-height:26px;"></div>
    </div>

    <input id="file-input" type="file" multiple accept="*/*" class="hidden" />
    <input id="image-input" type="file" accept="image/*" class="hidden" />

    <div id="sort-bar" class="flex gap-1 mb-2 text-[11px]">
      <button data-action="select-all" id="select-all-btn" class="shrink-0 px-1.5 py-0.5 rounded-full border bg-white text-slate-700 border-slate-300 active:bg-slate-100">☐ 전체</button>
      <button data-sort="created_desc" class="sort-chip shrink-0 px-1.5 py-px rounded-full border text-[10px]">최신</button>
      <button data-sort="created_asc" class="sort-chip shrink-0 px-1.5 py-px rounded-full border text-[10px]">과거</button>
      <button data-sort="name_asc" class="sort-chip shrink-0 px-1.5 py-px rounded-full border text-[10px]">이름↑</button>
      <button data-sort="name_desc" class="sort-chip shrink-0 px-1.5 py-px rounded-full border text-[10px]">이름↓</button>
      <button data-sort="type" class="sort-chip shrink-0 px-1.5 py-px rounded-full border text-[10px]">형식</button>
    </div>

    <p id="upload-status" class="text-[11px] text-blue-700 mt-2 mb-1 hidden text-center"></p>

    <div id="upload-progress-overlay" class="fixed inset-0 bg-black/50 z-50 hidden items-center justify-center p-4" style="display: none;">
      <div class="bg-white rounded-2xl p-5 w-full max-w-xs shadow-xl">
        <div class="flex items-center gap-2 mb-3">
          <div class="w-5 h-5 border-2 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
          <h3 class="text-sm font-bold flex-1">파일 업로드 중</h3>
          <span id="upload-progress-count" class="text-[11px] text-slate-500 font-medium">0/0</span>
        </div>
        <p id="upload-progress-name" class="text-xs text-slate-700 mb-2 truncate font-medium">—</p>
        <div class="w-full bg-slate-100 rounded-full h-2 overflow-hidden">
          <div id="upload-progress-bar" class="h-full bg-blue-600 transition-all duration-200" style="width: 0%"></div>
        </div>
        <p class="text-[10px] text-slate-400 mt-2 text-center">완료될 때까지 이 화면을 닫지 마세요</p>
      </div>
    </div>

    <div id="contents" class="space-y-1 mt-1.5">
      <div class="flex items-center gap-1.5 px-2.5 py-1 bg-white rounded-lg border border-slate-200 animate-pulse">
        <div class="w-6 h-6 rounded bg-slate-200 shrink-0"></div>
        <div class="flex-1 space-y-1">
          <div class="h-2.5 bg-slate-200 rounded w-3/4"></div>
          <div class="h-2 bg-slate-200 rounded w-1/3"></div>
        </div>
      </div>
      <div class="flex items-center gap-1.5 px-2.5 py-1 bg-white rounded-lg border border-slate-200 animate-pulse opacity-70">
        <div class="w-6 h-6 rounded bg-slate-200 shrink-0"></div>
        <div class="flex-1 space-y-1">
          <div class="h-2.5 bg-slate-200 rounded w-2/3"></div>
          <div class="h-2 bg-slate-200 rounded w-1/4"></div>
        </div>
      </div>
      <div class="flex items-center gap-1.5 px-2.5 py-1 bg-white rounded-lg border border-slate-200 animate-pulse opacity-40">
        <div class="w-6 h-6 rounded bg-slate-200 shrink-0"></div>
        <div class="flex-1 space-y-1">
          <div class="h-2.5 bg-slate-200 rounded w-1/2"></div>
          <div class="h-2 bg-slate-200 rounded w-1/4"></div>
        </div>
      </div>
    </div>
  </main>

  <div
    id="recent-files-bar"
    class="fixed bottom-0 left-0 right-0 bg-white border-t-2 border-slate-300 z-30 shadow-[0_-4px_12px_rgba(0,0,0,0.08)]"
    style="height: 22vh; padding-bottom: env(safe-area-inset-bottom);"
  >
    <div class="max-w-md mx-auto px-3 pt-2 pb-1 h-full flex flex-col">
      <h3 class="text-[10px] font-bold text-slate-500 mb-1 shrink-0">📌 본 프로젝트에 최근 등록된 파일</h3>
      <div id="recent-files-list" class="flex-1 overflow-y-auto space-y-1 pr-0.5"></div>
    </div>
  </div>

  <div
    id="action-bar"
    class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 px-3 py-2 hidden z-40 shadow-[0_-4px_12px_rgba(0,0,0,0.05)]"
    style="padding-bottom: calc(env(safe-area-inset-bottom) + 8px);"
  >
    <div class="max-w-md mx-auto">
      <div class="flex items-center mb-1.5">
        <span class="text-xs flex-1"><strong id="selected-count">0</strong>개 선택됨</span>
        <button id="cancel-select" class="text-xs text-slate-500 px-2 py-1">✕ 취소</button>
      </div>
      <div class="flex gap-1.5">
        <button id="bulk-download" class="flex-1 text-xs bg-blue-600 text-white rounded-lg px-2 py-1.5 font-medium active:bg-blue-700">⬇ 다운로드</button>
        <button id="bulk-move" class="admin-only flex-1 text-xs bg-slate-700 text-white rounded-lg px-2 py-1.5 font-medium active:bg-slate-800">📂 이동</button>
        <button id="bulk-delete" class="admin-only flex-1 text-xs bg-red-600 text-white rounded-lg px-2 py-1.5 font-medium active:bg-red-700">🗑 삭제</button>
      </div>
    </div>
  </div>

  <div id="move-modal" class="fixed inset-0 bg-black/50 z-50 hidden items-end sm:items-center justify-center p-3" style="display: none;">
    <div class="bg-white rounded-2xl p-4 w-full max-w-md max-h-[80vh] flex flex-col">
      <div class="flex items-center justify-between mb-2">
        <h3 class="text-sm font-bold">어디로 이동할까요?</h3>
        <button id="move-cancel" class="text-slate-400 text-lg leading-none px-1">✕</button>
      </div>
      <p class="text-[10px] text-slate-500 mb-2">아래에서 이동할 위치를 선택하세요</p>
      <div id="move-folder-list" class="flex-1 overflow-y-auto space-y-0.5 text-xs"></div>
    </div>
  </div>

  <script src="/admin.js"></script>
  <script src="/project.js"></script>
</body>
</html>
